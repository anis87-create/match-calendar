<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mon calendrier de matchs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f4f4f4;color:#111;padding:1.5rem;}
@media(prefers-color-scheme:dark){
  body{background:#1a1a1a;color:#f0f0f0;}
  .add-form,.match-card,.stat-card,.legend-box{background:#2a2a2a;border-color:#333;}
  .form-group input,.form-group select{background:#2a2a2a;color:#f0f0f0;border-color:#444;}
  .filter-btn{background:#232323;border-color:#444;color:#aaa;}
  .cancel-btn{color:#aaa;border-color:#444;}
  .edit-btn{border-color:#444;color:#aaa;}
  .watched-btn{border-color:#444;color:#aaa;}
  .match-card.editing{background:#1e2233!important;}
  .match-card.drag-over{background:#1e2a3a!important;}
  .day-group-title{color:#aaa;}
  .team-logo-wrap{background:#333;}
}
.container{max-width:760px;margin:0 auto;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.club-badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.badge-inter{background:#1a1a2e;color:#6eb6ff;border:2px solid #003399;}
.badge-cab{background:#1a1a00;color:#ffd700;border:2px solid #ccaa00;}
.badge-tun{background:#cc0000;color:#fff;border:2px solid #990000;}
.header-text h2{font-size:20px;font-weight:600;}
.header-text p{font-size:13px;color:#888;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem;}
.stat-card{background:#fff;border-radius:10px;padding:10px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.stat-num{font-size:22px;font-weight:600;}
.stat-label{font-size:11px;color:#888;}
.legend-box{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:1.2rem;border:1px solid #e5e5e5;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#555;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.add-form{background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;border:1px solid #e5e5e5;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.form-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.form-title .mode{font-size:12px;color:#888;font-weight:400;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:12px;color:#666;}
.form-group input,.form-group select{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:inherit;width:100%;}
.btn-row{display:flex;gap:8px;margin-top:6px;}
.add-btn{background:#003399;color:#fff;border:none;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;flex:1;}
.add-btn:hover{background:#0044bb;}
.cancel-btn{background:none;color:#555;border:1px solid #ddd;padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:5px 13px;border-radius:999px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;}
.filter-btn.active{background:#003399;color:#fff;border-color:#003399;}
.match-list{display:flex;flex-direction:column;gap:8px;min-height:60px;}
.day-group{margin-bottom:4px;}
.day-group-title{font-size:12px;font-weight:600;color:#888;margin-bottom:6px;padding-left:4px;display:flex;align-items:center;gap:8px;}
.day-limit-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500;}
.limit-ok{background:#eafaf1;color:#1e8449;}
.limit-warn{background:#fff8e1;color:#f57f17;}
.match-card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;display:flex;align-items:stretch;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .15s,opacity .15s,transform .15s;overflow:hidden;}
.match-card.editing{border:2px solid #003399!important;background:#f0f4ff;}
.match-card.dragging{opacity:.4;transform:scale(.98);box-shadow:none;}
.match-card.drag-over{box-shadow:0 0 0 2px #003399;background:#f0f4ff;}
.team-strip-left{width:5px;flex-shrink:0;}
.team-strip-right{width:5px;flex-shrink:0;}
.card-inner{display:flex;align-items:center;gap:8px;padding:10px 10px;flex:1;min-width:0;}
.drag-handle{cursor:grab;color:#ccc;font-size:14px;user-select:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
/* Logos area */
.logos-area{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.team-logo-wrap{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.team-logo-wrap img{width:22px;height:22px;object-fit:contain;}
.vs-text{font-size:9px;color:#aaa;font-weight:600;}
.flag-img{width:18px;height:13px;object-fit:cover;border-radius:2px;}
.match-date{min-width:42px;text-align:center;flex-shrink:0;}
.match-date .day{font-size:19px;font-weight:600;line-height:1;}
.match-date .month{font-size:10px;color:#888;text-transform:uppercase;}
.match-info{flex:1;min-width:0;}
.match-teams{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-meta{font-size:11px;color:#888;margin-top:1px;display:flex;align-items:center;gap:4px;}
.league-flag{width:14px;height:10px;object-fit:cover;border-radius:1px;flex-shrink:0;}
.prio-label{font-size:10px;margin-top:2px;font-weight:500;}
.prio-label.p1{color:#003399;}
.prio-label.p2{color:#1e8449;}
.prio-label.p3{color:#e67e00;}
.match-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.match-time{font-size:12px;font-weight:500;}
.pill{font-size:10px;padding:2px 7px;border-radius:999px;white-space:nowrap;}
.pill-inter{background:#e6eeff;color:#003399;}
.pill-cab{background:#fffbe6;color:#8a7000;}
.pill-tunisie{background:#ffe6e6;color:#990000;}
.pill-important{background:#fdeaea;color:#c0392b;}
.pill-ucl{background:#e6eeff;color:#185fa5;}
.pill-uel{background:#fff0e6;color:#a04000;}
.pill-uecl{background:#e6f7ee;color:#1a7a3c;}
.pill-pl{background:#eaf3de;color:#3b6d11;}
.pill-liga{background:#faeeda;color:#854f0b;}
.pill-serie{background:#e6eeff;color:#003399;}
.pill-coppa{background:#ddeeff;color:#003399;}
.pill-bundesliga{background:#fdeaea;color:#c0392b;}
.pill-ligue1fr{background:#eef0ff;color:#2c3e8c;}
.pill-ligue1{background:#fffbe6;color:#8a7000;}
.pill-coparey{background:#faeeda;color:#854f0b;}
.pill-facup{background:#eaf3de;color:#3b6d11;}
.pill-carabaocup{background:#e6f7ee;color:#1a7a3c;}
.pill-dfbpokal{background:#fdeaea;color:#c0392b;}
.pill-coupefr{background:#eef0ff;color:#2c3e8c;}
.pill-cuptun{background:#ffe6e6;color:#990000;}
.pill-caf{background:#faeeda;color:#854f0b;}
.pill-wcq{background:#f0e6ff;color:#5a0099;}
.pill-wc{background:#f0f0f0;color:#555;}
.pill-friendly{background:#f0f0f0;color:#777;}
.action-btns{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;}
.edit-btn{background:none;border:1px solid #ddd;border-radius:999px;font-size:11px;padding:2px 8px;cursor:pointer;color:#666;}
.edit-btn:hover{color:#003399;border-color:#003399;}
.delete-btn{background:none;border:none;cursor:pointer;color:#aaa;font-size:14px;padding:2px 4px;}
.delete-btn:hover{color:#e24b4a;}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px;}
.watched-btn{background:none;border:1px solid #ddd;border-radius:999px;font-size:11px;padding:2px 8px;cursor:pointer;color:#666;}
.watched-btn.done{background:#eafaf1;color:#1e8449;border-color:transparent;}
.hint{font-size:11px;color:#bbb;margin-bottom:8px;}
.color-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.color-group{display:flex;flex-direction:column;gap:4px;}
.color-group label{font-size:12px;color:#666;}
.color-group input[type=color]{width:100%;height:34px;border-radius:8px;border:1px solid #ddd;padding:2px 4px;cursor:pointer;background:#fff;}
.logo-preview{display:flex;align-items:center;gap:8px;margin-bottom:8px;min-height:36px;}
.logo-preview-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666;}
.logo-preview-item img{width:24px;height:24px;object-fit:contain;}
.logo-preview-item .no-logo{font-size:11px;color:#aaa;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="club-badge badge-inter">INTER</div>
    <div class="club-badge badge-cab">CAB</div>
    <div class="club-badge badge-tun">TUN</div>
    <div class="header-text">
      <h2>Mon calendrier de matchs</h2>
      <p>Inter · CAB · Tunisie + matchs importants</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="total-count">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" id="inter-count">0</div><div class="stat-label">Inter</div></div>
    <div class="stat-card"><div class="stat-num" id="fav-count">0</div><div class="stat-label">CAB / Tunisie</div></div>
    <div class="stat-card"><div class="stat-num" id="watched-count">0</div><div class="stat-label">Regardés</div></div>
  </div>

  <div class="legend-box">
    <span style="font-size:12px;font-weight:600;color:#555;">Priorité :</span>
    <div class="legend-item"><div class="legend-dot" style="background:#003399;"></div>Incontournable</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1e8449;"></div>À regarder</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f57f17;"></div>Si disponible</div>
  </div>

  <div class="add-form" id="add-form">
    <div class="form-title"><span id="form-title-text">Ajouter un match</span><span class="mode" id="form-mode-label"></span></div>
    <div class="form-grid">
      <div class="form-group"><label>Équipe domicile</label><input id="inp-team1" placeholder="Ex : Inter Milan"/></div>
      <div class="form-group"><label>Équipe visiteur</label><input id="inp-team2" placeholder="Ex : AC Milan"/></div>
    </div>
    <div class="logo-preview" id="logo-preview">
      <div class="logo-preview-item" id="prev1"><span class="no-logo">—</span></div>
      <span style="color:#aaa;font-size:12px;">vs</span>
      <div class="logo-preview-item" id="prev2"><span class="no-logo">—</span></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Compétition</label>
        <select id="inp-league">
          <optgroup label="Coupes européennes">
            <option value="ucl">Ligue des Champions UEFA</option>
            <option value="uel">Europa League</option>
            <option value="uecl">Conference League</option>
          </optgroup>
          <optgroup label="Championnats">
            <option value="serie">Serie A (Italie)</option>
            <option value="liga">Liga (Espagne)</option>
            <option value="pl">Premier League (Angleterre)</option>
            <option value="bundesliga">Bundesliga (Allemagne)</option>
            <option value="ligue1fr">Ligue 1 (France)</option>
            <option value="ligue1">Ligue 1 (Tunisie)</option>
          </optgroup>
          <optgroup label="Coupes nationales">
            <option value="coppa">Coupe d'Italie</option>
            <option value="coparey">Coupe du Roi (Espagne)</option>
            <option value="facup">FA Cup (Angleterre)</option>
            <option value="carabaocup">Carabao Cup (Angleterre)</option>
            <option value="dfbpokal">Coupe d'Allemagne (DFB Pokal)</option>
            <option value="coupefr">Coupe de France</option>
            <option value="cuptun">Coupe de Tunisie</option>
          </optgroup>
          <optgroup label="Afrique &amp; Monde">
            <option value="caf">Ligue des Champions CAF</option>
            <option value="wcq_afr">Qualifications CDM — Afrique</option>
            <option value="wcq_eur">Qualifications CDM — Europe</option>
            <option value="wcq_asi">Qualifications CDM — Asie</option>
            <option value="wcq_sam">Qualifications CDM — Amérique du Sud</option>
            <option value="wc">Coupe du Monde</option>
            <option value="friendly">Match amical</option>
            <option value="other">Autre</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group"><label>Équipe favorite</label>
        <select id="inp-type">
          <option value="inter">Inter Milan</option>
          <option value="cab">CAB</option>
          <option value="tunisie">Équipe de Tunisie</option>
          <option value="important">Match important</option>
        </select>
      </div>
    </div>
    <div class="form-grid-3">
      <div class="form-group"><label>Date</label><input id="inp-date" type="date"/></div>
      <div class="form-group"><label>Heure</label><input id="inp-time" type="time"/></div>
      <div class="form-group"><label>Chaîne (optionnel)</label><input id="inp-channel" placeholder="Ex : beIN 1"/></div>
    </div>
    <div class="color-row">
      <div class="color-group"><label>Couleur équipe domicile</label><input type="color" id="inp-color1" value="#003399"/></div>
      <div class="color-group"><label>Couleur équipe visiteur</label><input type="color" id="inp-color2" value="#cc0000"/></div>
    </div>
    <div class="btn-row">
      <button class="add-btn" id="submit-btn" onclick="submitMatch()">Ajouter le match</button>
      <button class="cancel-btn" id="cancel-btn" style="display:none" onclick="cancelEdit()">Annuler</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('inter',this)">Inter</button>
    <button class="filter-btn" onclick="setFilter('cab',this)">CAB</button>
    <button class="filter-btn" onclick="setFilter('tunisie',this)">Tunisie</button>
    <button class="filter-btn" onclick="setFilter('important',this)">Importants</button>
    <button class="filter-btn" onclick="setFilter('upcoming',this)">À venir</button>
    <button class="filter-btn" onclick="setFilter('watched',this)">Regardés</button>
    <button class="filter-btn" onclick="setFilter('watch',this)">À regarder</button>
  </div>

  <p class="hint" id="drag-hint"></p>
  <div class="match-list" id="match-list"></div>
</div>

async function fetchTeamLogo(teamName){
  const key=teamName.trim().toLowerCase();
  if(logoCache[key]!==undefined) return logoCache[key];
  // Check static logos first
  for(const k of Object.keys(STATIC_LOGOS)){
    if(key.includes(k)||k.includes(key)){logoCache[key]=STATIC_LOGOS[k];return STATIC_LOGOS[k];}
  }
  logoCache[key]=null;
  return null;
}

function guessColor(name){
  const k=name.trim().toLowerCase();
  for(const key of Object.keys(TEAM_COLORS)){if(k.includes(key))return TEAM_COLORS[key][0];}
  let h=0;for(let i=0;i<k.length;i++)h=(h*31+k.charCodeAt(i))&0xffffff;
  return'#'+(h&0xffffff).toString(16).padStart(6,'0');
}

function loadData(){
  const keys=["match_v5","match_v4","match_v3","match_schedule_v2","match_schedule"];
  for(const k of keys){
    try{const s=localStorage.getItem(k);if(s){const p=JSON.parse(s);if(p&&p.matches&&p.matches.length>0){
      // migrate old format (teams string → team1/team2)
      p.matches=p.matches.map(m=>{
        if(!m.team1){const parts=(m.teams||"").split(/\s+vs\.?\s+/i);m.team1=parts[0]?.trim()||m.teams||"";m.team2=parts[1]?.trim()||"";}
        if(!m.logo1)m.logo1=null;if(!m.logo2)m.logo2=null;
        return m;
      });
      if(k!=="match_v5")localStorage.setItem("match_v5",JSON.stringify(p));
      return p;
    }}}catch(e){}
  }
  return{matches:DEFAULT_MATCHES,nextId:4};
}

function getScore(m){
  const fav=m.type==='inter'||m.type==='cab'||m.type==='tunisie';
  if(fav&&m.league!=='friendly') return 100;
  if(m.type==='important') return 95;
  if(['serie','ligue1'].includes(m.league)) return 70;
  if(['ucl','uel','uecl','caf'].includes(m.league)) return 65;
  if(['wcq_afr','wcq_eur','wcq_asi','wcq_sam','wc'].includes(m.league)) return 62;
  if(['pl','liga','bundesliga','ligue1fr'].includes(m.league)) return 45;
  if(['coppa','coparey','facup','carabaocup','dfbpokal','coupefr','cuptun'].includes(m.league)) return 35;
  if(fav&&m.league==='friendly') return 40;
  if(m.league==='friendly') return 20;
  return 30;
}
function getPriority(s){if(s>=90)return 1;if(s>=60)return 2;return 3;}
const prioText={1:"Incontournable",2:"À regarder",3:"Si disponible"};
const prioClass={1:"p1",2:"p2",3:"p3"};

function isWeekend(d){const day=new Date(d+"T12:00:00").getDay();return day===0||day===6;}
function getDayLimit(d){return isWeekend(d)?3:2;}

function buildPlan(){
  const byDay={};
  matches.forEach(m=>{if(!byDay[m.date])byDay[m.date]=[];byDay[m.date].push(m);});
  Object.keys(byDay).forEach(date=>{
    const limit=getDayLimit(date);
    const sorted=[...byDay[date]].sort((a,b)=>getScore(b)-getScore(a));
    sorted.forEach((m,i)=>{m._watch=i<limit;m._score=getScore(m);m._prio=getPriority(getScore(m));});
  });
}

function formatDate(d){const[y,mo,day]=d.split("-");return{day,month:months[parseInt(mo)-1],dateObj:new Date(d+"T12:00:00")};}
function groupByDay(arr){const g={};arr.forEach(m=>{if(!g[m.date])g[m.date]=[];g[m.date].push(m);});return g;}

function logoHtml(url,fallback,size=26){
  if(url) return`<img src="${url}" width="${size}" height="${size}" style="object-fit:contain" onerror="this.style.display='none'"/>`;
  const initials=fallback.trim().split(/\s+/).filter(w=>w.length>1).slice(0,2).map(w=>w[0].toUpperCase()).join('')||fallback.slice(0,2).toUpperCase();
  return`<span style="font-size:8px;font-weight:700;color:#888;">${initials}</span>`;
}

function render(){
  buildPlan();
  const list=document.getElementById("match-list");
  const today=new Date().toISOString().split("T")[0];
  let filtered=matches.filter(m=>{
    if(currentFilter==='inter')return m.type==='inter';
    if(currentFilter==='cab')return m.type==='cab';
    if(currentFilter==='tunisie')return m.type==='tunisie';
    if(currentFilter==='important')return m.type==='important';
    if(currentFilter==='upcoming')return m.date>=today&&!m.watched;
    if(currentFilter==='watched')return m.watched;
    if(currentFilter==='watch')return m._watch&&!m.watched&&m.date>=today;
    return true;
  });

  document.getElementById("total-count").textContent=matches.length;
  document.getElementById("inter-count").textContent=matches.filter(m=>m.type==="inter").length;
  document.getElementById("fav-count").textContent=matches.filter(m=>m.type==="cab"||m.type==="tunisie").length;
  document.getElementById("watched-count").textContent=matches.filter(m=>m.watched).length;
  document.getElementById("drag-hint").textContent=filtered.length>1?"Glisse les matchs pour les réordonner":"";

  if(!filtered.length){list.innerHTML='<div class="empty">Aucun match dans cette catégorie</div>';return;}

  const grouped=groupByDay(filtered);
  const sortedDays=Object.keys(grouped).sort();

  list.innerHTML=sortedDays.map(date=>{
    const{day,month,dateObj}=formatDate(date);
    const dayName=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"][dateObj.getDay()];
    const limit=getDayLimit(date);
    const watchDay=matches.filter(m=>m.date===date&&m._watch).length;
    const totalDay=matches.filter(m=>m.date===date).length;
    const limitClass=totalDay>limit?'limit-warn':'limit-ok';
    const fUrl=flagUrl(leagueCountry[grouped[date][0]?.league]||"un");

    const cards=grouped[date].map(m=>{
      const isEditing=editingId===m.id;
      const prio=m._prio??3;
      const c1=m.color1||'#cccccc';
      const c2=m.color2||'#cccccc';
      const teams=`${m.team1||''} vs ${m.team2||''}`;
      return`<div class="match-card ${m.type} ${isEditing?'editing':''}"
          style="${m.watched&&!isEditing?'opacity:0.5':''}"
          draggable="true" data-id="${m.id}"
          ondragstart="onDragStart(event)" ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)" ondrop="onDrop(event)" ondragend="onDragEnd(event)">
        <div class="team-strip-left" style="background:${c1};"></div>
        <div class="card-inner">
          <span class="drag-handle">&#8942;&#8942;</span>
          <div class="match-date"><div class="day">${day}</div><div class="month">${month}</div></div>
          <div class="logos-area">
            <div class="team-logo-wrap">${logoHtml(m.logo1,m.team1||'?')}</div>
            <span class="vs-text">vs</span>
            <div class="team-logo-wrap">${logoHtml(m.logo2,m.team2||'?')}</div>
          </div>
          <div class="match-info">
            <div class="match-teams">${teams}</div>
            <div class="match-meta">
              ${fUrl?`<img class="league-flag" src="${fUrl}" onerror="this.style.display='none'"/>`:''}
              ${leagueNames[m.league]}${m.channel?' · '+m.channel:''}
            </div>
            <div class="prio-label ${prioClass[prio]}">${m._watch?'✔ ':'– '}${prioText[prio]}</div>
          </div>
          <div class="match-right">
            <div class="match-time">${m.time}</div>
            <span class="pill ${typePill[m.type]}">${typeLabel[m.type]}</span>
            <button class="watched-btn ${m.watched?'done':''}" onclick="toggleWatched(${m.id})">${m.watched?'Regardé':'À regarder'}</button>
          </div>
          <div class="action-btns">
            <button class="edit-btn" onclick="startEdit(${m.id})">Modifier</button>
            <button class="delete-btn" onclick="deleteMatch(${m.id})">✕</button>
          </div>
        </div>
        <div class="team-strip-right" style="background:${c2};"></div>
      </div>`;
    }).join("");

    return`<div class="day-group">
      <div class="day-group-title">
        ${fUrl?`<img src="${fUrl}" style="width:16px;height:12px;object-fit:cover;border-radius:2px;" onerror="this.style.display='none'"/>`:''}
        ${dayName} ${day} ${month}
        <span class="day-limit-badge ${limitClass}">${watchDay} / ${limit} match${limit>1?'s':''} recommandé${limit>1?'s':''}</span>
      </div>
      ${cards}
    </div>`;
  }).join("");
}

// ── Drag & Drop ───────────────────────────────────────────────
function onDragStart(e){dragSrcId=parseInt(e.currentTarget.dataset.id);e.currentTarget.classList.add("dragging");e.dataTransfer.effectAllowed="move";}
function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect="move";const t=e.currentTarget;if(parseInt(t.dataset.id)!==dragSrcId)t.classList.add("drag-over");}
function onDragLeave(e){e.currentTarget.classList.remove("drag-over");}
function onDrop(e){
  e.preventDefault();const tid=parseInt(e.currentTarget.dataset.id);e.currentTarget.classList.remove("drag-over");
  if(dragSrcId===null||dragSrcId===tid)return;
  const si=matches.findIndex(m=>m.id===dragSrcId),ti=matches.findIndex(m=>m.id===tid);
  if(si===-1||ti===-1)return;
  const[moved]=matches.splice(si,1);matches.splice(ti,0,moved);
  saveData();render();
}
function onDragEnd(){dragSrcId=null;document.querySelectorAll(".match-card").forEach(c=>c.classList.remove("dragging","drag-over"));}

  document.getElementById("inp-team1").value=m.team1||"";
  document.getElementById("inp-team2").value=m.team2||"";
  document.getElementById("inp-league").value=m.league;
  document.getElementById("inp-date").value=m.date;
  document.getElementById("inp-time").value=m.time;
  document.getElementById("inp-type").value=m.type;
  document.getElementById("inp-channel").value=m.channel||"";
  document.getElementById("inp-color1").value=m.color1||"#003399";
  document.getElementById("inp-color2").value=m.color2||"#cc0000";
  const p1=document.getElementById("prev1"),p2=document.getElementById("prev2");
  p1.innerHTML=m.logo1?`<img src="${m.logo1}" width="22" height="22" style="object-fit:contain"/><span style="font-size:12px;">${m.team1}</span>`:`<span style="font-size:12px;">${m.team1||''}</span>`;
  p2.innerHTML=m.logo2?`<img src="${m.logo2}" width="22" height="22" style="object-fit:contain"/><span style="font-size:12px;">${m.team2}</span>`:`<span style="font-size:12px;">${m.team2||''}</span>`;

  document.getElementById("form-mode-label").textContent="";

async function submitMatch(){
  const team1=document.getElementById("inp-team1").value.trim();
  const team2=document.getElementById("inp-team2").value.trim();
  const date=document.getElementById("inp-date").value;
  const time=document.getElementById("inp-time").value;
  const league=document.getElementById("inp-league").value;
  const type=document.getElementById("inp-type").value;
  const channel=document.getElementById("inp-channel").value.trim();
  const color1=document.getElementById("inp-color1").value;
  const color2=document.getElementById("inp-color2").value;
  if(!team1||!team2||!date||!time){alert("Veuillez remplir les deux équipes, la date et l'heure");return;}

  const [logo1,logo2]=await Promise.all([fetchTeamLogo(team1),fetchTeamLogo(team2)]);

  if(editingId!==null){
    const m=matches.find(m=>m.id===editingId);
    if(m){m.team1=team1;m.team2=team2;m.league=league;m.date=date;m.time=time;m.type=type;m.channel=channel;m.color1=color1;m.color2=color2;m.logo1=logo1;m.logo2=logo2;}
    cancelEdit();
  }else{
    matches.push({id:nextId++,team1,team2,league,date,time,type,channel,watched:false,color1,color2,logo1,logo2});
    ["inp-team1","inp-team2","inp-channel"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("prev1").innerHTML='<span class="no-logo">—</span>';
    document.getElementById("prev2").innerHTML='<span class="no-logo">—</span>';
    saveData();render();
  }
}

function deleteMatch(id){if(editingId===id)cancelEdit();matches=matches.filter(m=>m.id!==id);saveData();render();}
function toggleWatched(id){const m=matches.find(m=>m.id===id);if(m)m.watched=!m.watched;saveData();render();}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();}

document.getElementById("inp-date").value=new Date().toISOString().split("T")[0];
render();
</script>
</body>
